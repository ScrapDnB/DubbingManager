name: Build Dubbing Manager

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build with PyInstaller
      run: |
        pyinstaller dubbing_manager.spec --clean
        
    - name: Create ZIP archive
      run: |
        Compress-Archive -Path "dist\Dubbing Manager.exe" -DestinationPath "Dubbing_Manager_Windows.zip"
        
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: Dubbing-Manager-Windows
        path: Dubbing_Manager_Windows.zip
        
    - name: Upload to Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Dubbing_Manager_Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build with PyInstaller
      run: |
        pyinstaller dubbing_manager.spec --clean
        
    - name: Sign application (ad-hoc)
      run: |
        codesign --remove-signature "dist/Dubbing Manager.app" || true
        find "dist/Dubbing Manager.app" -type f -name "*.so" -exec codesign --force --sign - {} \; || true
        find "dist/Dubbing Manager.app/Contents/Frameworks" -type d -name "*.framework" -exec codesign --force --deep --sign - {} \; || true
        codesign --force --deep --sign - "dist/Dubbing Manager.app"
        
    - name: Create DMG
      run: |
        hdiutil create -volname "Dubbing Manager" -srcfolder "dist/Dubbing Manager.app" -ov -format UDZO Dubbing_Manager_macOS.dmg
        
    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: Dubbing-Manager-macOS
        path: Dubbing_Manager_macOS.dmg
        
    - name: Upload to Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Dubbing_Manager_macOS.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        sudo apt-get update
        sudo apt-get install -y libxcb-xinerama0 libxcb-cursor0
        
    - name: Build with PyInstaller
      run: |
        pyinstaller dubbing_manager.spec --clean
        
    - name: Create tar.gz archive
      run: |
        tar -czvf Dubbing_Manager_Linux.tar.gz -C dist Dubbing\ Manager
        
    - name: Create AppImage (optional)
      run: |
        # Download appimagetool
        wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage
        
        # Create AppDir structure
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/lib
        cp -r dist/Dubbing\ Manager AppDir/usr/bin/
        cp -r dist/Dubbing\ Manager_lib/* AppDir/usr/lib/ 2>/dev/null || true
        
        # Create desktop file
        cat > AppDir/Dubbing\ Manager.desktop << EOF
        [Desktop Entry]
        Type=Application
        Name=Dubbing Manager
        Exec=Dubbing Manager
        Icon=dubbing-manager
        Categories=AudioVideo;Utility;
        EOF
        
        # Create simple icon
        convert -size 256x256 xc:blue AppDir/dubbing-manager.png 2>/dev/null || echo "Icon not created"
        
        # Build AppImage
        ./appimagetool-x86_64.AppImage AppDir Dubbing_Manager_Linux.AppImage 2>/dev/null || echo "AppImage not created"
        
    - name: Upload Linux artifact (tar.gz)
      uses: actions/upload-artifact@v4
      with:
        name: Dubbing-Manager-Linux
        path: Dubbing_Manager_Linux.tar.gz
        
    - name: Upload Linux AppImage
      if: hashFiles('Dubbing_Manager_Linux.AppImage') != ''
      uses: actions/upload-artifact@v4
      with:
        name: Dubbing-Manager-Linux-AppImage
        path: Dubbing_Manager_Linux.AppImage
        
    - name: Upload to Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          Dubbing_Manager_Linux.tar.gz
          Dubbing_Manager_Linux.AppImage
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ubuntu-deb:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        sudo apt-get update
        sudo apt-get install -y libxcb-xinerama0 libxcb-cursor0
        
    - name: Build with PyInstaller
      run: |
        pyinstaller dubbing_manager.spec --clean
        
    - name: Create DEB package structure
      run: |
        # Create DEB structure
        mkdir -p dubbing-manager/DEBIAN
        mkdir -p dubbing-manager/usr/bin
        mkdir -p dubbing-manager/usr/share/applications
        mkdir -p dubbing-manager/usr/share/icons/hicolor/256x256/apps
        
        # Copy binary
        cp -r dist/Dubbing\ Manager dubbing-manager/usr/bin/dubbing-manager
        
        # Create control file
        cat > dubbing-manager/DEBIAN/control << EOF
        Package: dubbing-manager
        Version: ${GITHUB_REF#refs/tags/v}
        Section: utils
        Priority: optional
        Architecture: amd64
        Maintainer: Yuri Romanov
        Description: Dubbing Manager - Tool for managing dubbing projects
        Depends: libxcb-xinerama0, libxcb-cursor0
        EOF
        
        # Create desktop file
        cat > dubbing-manager/usr/share/applications/dubbing-manager.desktop << EOF
        [Desktop Entry]
        Type=Application
        Name=Dubbing Manager
        Exec=/usr/bin/dubbing-manager
        Categories=AudioVideo;Utility;
        EOF
        
        # Create simple icon
        convert -size 256x256 xc:blue dubbing-manager/usr/share/icons/hicolor/256x256/apps/dubbing-manager.png 2>/dev/null || true
        
    - name: Build DEB package
      run: |
        dpkg-deb --build dubbing-manager Dubbing_Manager_Ubuntu.deb
        
    - name: Upload DEB artifact
      uses: actions/upload-artifact@v4
      with:
        name: Dubbing-Manager-Ubuntu-DEB
        path: Dubbing_Manager_Ubuntu.deb
        
    - name: Upload to Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Dubbing_Manager_Ubuntu.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
