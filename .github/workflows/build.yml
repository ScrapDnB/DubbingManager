name: Build Dubbing Manager

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.14"
  PYTHONUTF8: "1"

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Run tests
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

      - name: Build Windows app
        shell: pwsh
        run: python -m PyInstaller dubbing_manager.spec --clean

      - name: Verify Windows artifact
        shell: pwsh
        run: |
          if (!(Test-Path "dist\Dubbing Manager\Dubbing Manager.exe")) {
            throw "Windows executable was not created"
          }

      - name: Create Windows ZIP
        shell: pwsh
        run: Compress-Archive -Path "dist\Dubbing Manager" -DestinationPath "Dubbing_Manager_Windows.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dubbing-Manager-Windows
          path: Dubbing_Manager_Windows.zip

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Dubbing_Manager_Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

      - name: Build macOS app
        run: python -m PyInstaller dubbing_manager.spec --clean

      - name: Verify macOS app
        run: |
          test -d "dist/Dubbing Manager.app"
          test -f "dist/Dubbing Manager.app/Contents/Resources/DubbingManager.icns"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconFile" "dist/Dubbing Manager.app/Contents/Info.plist" | grep -x "DubbingManager.icns"

      - name: Sign macOS app ad-hoc
        run: |
          APP_PATH="dist/Dubbing Manager.app"
          codesign --remove-signature "$APP_PATH" 2>/dev/null || true
          find "$APP_PATH" -type f -name "*.so" -exec codesign --force --sign - {} \; 2>/dev/null || true
          find "$APP_PATH/Contents/Frameworks" -type d -name "*.framework" -exec codesign --force --deep --sign - {} \; 2>/dev/null || true
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"

      - name: Remove PyInstaller collect folder
        run: |
          rm -rf "dist/Dubbing Manager"/* "dist/Dubbing Manager"/.[!.]* "dist/Dubbing Manager"/..?* 2>/dev/null || true
          rmdir "dist/Dubbing Manager"/_internal "dist/Dubbing Manager" 2>/dev/null || true

      - name: Create macOS DMG
        run: hdiutil create -volname "Dubbing Manager" -srcfolder "dist/Dubbing Manager.app" -ov -format UDZO Dubbing_Manager_macOS.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dubbing-Manager-macOS
          path: Dubbing_Manager_macOS.dmg

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Dubbing_Manager_macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
